        <a href="index.html">Home</a>

        <a href="Add_Course.html">Add Course</a>
        <a href="Contact_Us.html">Contact Us</a>
        </div>

    <main>
        <section>
            <div class="course-form-container">
                <h2>Add Course</h2>
                <form>
                    <label>Course Name</label>
                    <input type="text" placeholder="Enter course name" required>

                    <label>Instructor</label>
                    <input type="text" placeholder="Enter instructor name" required>

                    <label>Credit Hours</label>
                    <input type="number" placeholder="Enter credit hours" required>

                    <label>Notes</label>
                    <textarea placeholder="Enter notes..."></textarea>

                    <button type="submit">Submit</button>
                </form>
            </div>
        </section>
    </main>
